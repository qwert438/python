{% extends "base.html" %}
{% block title %}登录 - 智能日程管理器{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;margin-top:60px;">
    <div class="card">
        <h2 style="margin-bottom:8px;font-size:22px;">🔐 账号登录 / 注册</h2>
        <p style="color:#64748b;margin-bottom:20px;font-size:13px;">服务器: {{ server_url }} · 与桌面版数据互通</p>
        <form method="POST">
            <label>用户名</label>
            <input type="text" name="username" required placeholder="2-20 位中文、字母、数字或下划线" minlength="2" maxlength="20" style="margin-bottom:14px;">
            <label>密码</label>
            <input type="password" name="password" required placeholder="至少 6 位" style="margin-bottom:20px;">
            {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
            <div style="display:flex;gap:8px;">
                <button type="submit" name="action" value="login" class="btn btn-primary" style="flex:1;">登 录</button>
                <button type="submit" name="action" value="register" class="btn btn-success" style="flex:1;">注册并登录</button>
            </div>
        </form>
        <p style="margin-top:16px;font-size:12px;color:#64748b;text-align:center;">与桌面版 (main.py / app.py) 共用同一套数据库</p>
    </div>
</div>
{% endblock %}
